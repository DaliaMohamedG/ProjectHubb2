<!DOCTYPE html>
<html dir="rtl">
<head>
    <title>Test Notifications</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/7.0.5/signalr.min.js"></script>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
            background: #f5f5f5;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 16px;
        }

        input {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
            width: 250px;
            margin-left: 8px;
        }

        button {
            padding: 8px 16px;
            background: #0066cc;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .notif {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            border-right: 4px solid;
        }

        .info {
            background: #e6f1fb;
            border-color: #0066cc;
        }

        .success {
            background: #eaf3de;
            border-color: #3b6d11;
        }

        .warning {
            background: #faeeda;
            border-color: #854f0b;
        }

        .error {
            background: #fcebeb;
            border-color: #a32d2d;
        }

        #status {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: red;
            margin-left: 6px;
        }

            #status.connected {
                background: #3b6d11;
            }
    </style>
</head>
<body>

    <div class="card">
        <h2>🔌 الاتصال بـ SignalR</h2>
        <input id="userId" placeholder="ادخلي User ID هنا" />
        <button onclick="connect()">اتصل</button>
        <span id="status"></span>
        <span id="status-text">غير متصل</span>
    </div>

    <div class="card">
        <h2>🔔 الإشعارات الواصلة</h2>
        <div id="notifications">
            <p style="color:#999">في انتظار الإشعارات...</p>
        </div>
    </div>

    <script>
    let connection = null;

    async function connect() {
        const userId = document.getElementById('userId').value;
        if (!userId) { alert('ادخلي User ID!'); return; }

        connection = new signalR.HubConnectionBuilder()
            .withUrl('/notificationHub', {
                transport: signalR.HttpTransportType.LongPolling
            })
            .withAutomaticReconnect()
            .build();

        connection.on('ReceiveNotification', (notif) => {
            const div = document.getElementById('notifications');
            div.innerHTML = `
                <div class="notif ${notif.type}">
                    <strong>${notif.title}</strong><br/>
                    ${notif.message}<br/>
                    <small>${new Date(notif.createdAt).toLocaleTimeString('ar-EG')}</small>
                </div>
            ` + div.innerHTML;
        });

        await connection.start();
        await connection.invoke('JoinUserGroup', userId);

        document.getElementById('status').className = 'connected';
        document.getElementById('status-text').textContent = `متصل كـ ${userId}`;
    }
    </script>

</body>
</html>
